name: Publish

"on":
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    shell: bash

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify-ci:
    name: Verify CI is green
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'release' && github.event.action == 'published'
    permissions:
      actions: read
      contents: read
    steps:
      - name: Checkout source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Verify successful CI run for the release commit
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          release_sha="$(git rev-list -n 1 "refs/tags/${RELEASE_TAG}")"
          echo "Checking CI status for ${RELEASE_TAG} at ${release_sha}"
          conclusion="$(
            gh api \
              "repos/${REPOSITORY}/actions/workflows/ci.yml/runs?head_sha=${release_sha}&status=completed&event=push&per_page=1" \
              --jq '.workflow_runs[0].conclusion // ""'
          )"
          if [[ "${conclusion}" != "success" ]]; then
            echo "Required workflow ci.yml is not green for ${release_sha} (got: ${conclusion:-<none>})."
            exit 1
          fi

  publish:
    name: Publish to crates.io
    needs: verify-ci
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: always() && (needs.verify-ci.result == 'success' || needs.verify-ci.result == 'skipped')
    environment: crates-io
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        run: rustup show

      - name: Authenticate with crates.io
        uses: rust-lang/crates-io-auth-action@c6f97d42243bad5fab37ca0427f495c86d5b1a18  # v1.0.5
        id: auth

      - name: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: |
          set -euo pipefail
          cargo publish --locked
