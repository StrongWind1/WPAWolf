# =============================================================================
# ci.yml -- fast verification that wpawolf still compiles, passes lints, and
# passes tests. Runs on every push to main and on every pull request. This is
# the gate that blocks merges.
#
# Jobs are split into small parallel units so overall wall time is roughly
# "slowest single job" rather than "sum of everything".
#
# WHEN THINGS RUN
#   push to main      -> every job runs. (Main should always be green.)
#   pull request      -> every job runs. (Gate for merges.)
#   workflow_dispatch -> can be triggered manually from the Actions tab.
#
# Tag pushes are handled by release.yml. Scheduled supply-chain scans live
# in security.yml.
#
# GLOSSARY
#   cargo       -- Rust's build tool / package manager.
#   cargo fmt   -- automatic code formatter.
#   cargo check -- fast "does this compile?" without producing a binary.
#   cargo test  -- compiles and runs unit + integration tests.
#   cargo doc   -- builds HTML API documentation from doc-comments.
#   clippy      -- the Rust linter. Part of the standard toolchain.
#   MSRV        -- Minimum Supported Rust Version. wpawolf declares 1.95.
# =============================================================================

name: CI

# Label each run in the Actions tab so CI / Security / Release runs are easy
# to distinguish. Scheduled runs have no head_commit; fall back to ref name.
run-name: CI -- ${{ github.event.head_commit.message || github.ref_name }}

"on":
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# If a new commit lands on a branch while an earlier CI run for that same
# branch is still in flight, cancel the older run. Saves runner minutes and
# avoids confusing "old commit failed, new commit passed" signals.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

# Workflow-wide permissions: everything read-only. Individual jobs override
# this if they need to write (none of the jobs here do; release.yml is where
# write permissions live).
permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # fmt -- is every .rs file formatted according to the project's rustfmt
  # rules? Seconds-long check but important: prevents merge conflicts caused
  # by unrelated whitespace rewrites.
  # ---------------------------------------------------------------------------
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout source
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        # rust-toolchain.toml at repo root pins the exact Rust version.
        # `rustup show` reads that file and installs whatever it requests.
        run: rustup show

      - name: cargo fmt --check
        # --check exits non-zero when any file would be reformatted, instead
        # of rewriting files in place.
        run: cargo fmt --all -- --check

  # ---------------------------------------------------------------------------
  # clippy -- the Rust linter. Catches common mistakes, unidiomatic patterns,
  # and performance footguns. Cargo.toml sets clippy rules to warn or deny;
  # --all-targets --all-features ensures tests are linted too.
  # ---------------------------------------------------------------------------
  clippy:
    name: clippy
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout source
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        run: rustup show

      # actions/cache (official) reuses compiled dependency artefacts between
      # runs. Without this every CI job recompiles flate2, miniz_oxide, etc.
      # from scratch. With it only the crate-under-test rebuilds.
      - name: Cache cargo build artefacts
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ubuntu-cargo-clippy-${{ hashFiles('**/Cargo.lock') }}-${{ hashFiles('**/rust-toolchain.toml') }}
          restore-keys: |
            ubuntu-cargo-clippy-
            ubuntu-cargo-

      - name: cargo clippy
        run: cargo clippy --all-targets --all-features -- --deny warnings

  # ---------------------------------------------------------------------------
  # test -- the real test gate. wpawolf has no Cargo feature flags today, so
  # a single Linux configuration covers the whole crate.
  #
  # The parity test in tests/integration/superset_test.rs runs hcxpcapngtool
  # as an oracle and asserts wpawolf's output is a superset. wpawolf claims
  # parity against hcxpcapngtool >= 7.0.1 only -- older releases emit a
  # different WPA*01* / WPA*02* trailer format. Distro packages (Ubuntu,
  # Debian) ship 6.2.x at time of writing, so we build the oracle from the
  # upstream source at a pinned tag and put it on PATH before `cargo test`.
  #
  # `CI=true` is exported into the test environment so the parity test panics
  # rather than silently skipping if the install step ever drops; the
  # superset test reads that env var and switches its missing-oracle branch
  # from a soft skip to a hard failure.
  # ---------------------------------------------------------------------------
  test:
    name: test
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      # Pinned oracle version. Bump when wpawolf is re-validated against a
      # newer hcxpcapngtool tag. Keep this >= the test's MIN_HCXPCAPNGTOOL.
      HCXTOOLS_TAG: 7.1.2
    steps:
      - name: Checkout source
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        run: rustup show

      - name: Install hcxpcapngtool oracle (pinned)
        # hcxpcapngtool is the parity oracle for the superset test. Distro
        # packages are years stale (Ubuntu 22.04/24.04 ship 6.2.x) and emit a
        # pre-7.0.1 format that fails the superset comparison for unrelated
        # reasons. Build from the upstream tag pinned in HCXTOOLS_TAG above.
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libssl-dev libz-dev
          tmpdir="$(mktemp -d)"
          git clone --quiet --depth 1 --branch "${HCXTOOLS_TAG}" \
            https://github.com/ZerBea/hcxtools.git "${tmpdir}"
          make -C "${tmpdir}" hcxpcapngtool
          sudo install -m 0755 "${tmpdir}/hcxpcapngtool" /usr/local/bin/hcxpcapngtool
          hcxpcapngtool --version

      - name: Cache cargo build artefacts
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ubuntu-cargo-test-${{ hashFiles('**/Cargo.lock') }}-${{ hashFiles('**/rust-toolchain.toml') }}
          restore-keys: |
            ubuntu-cargo-test-
            ubuntu-cargo-

      - name: cargo test --all-targets --all-features
        env:
          # Forwarded to cargo so the superset test sees CI=true and treats
          # a missing or stale oracle as a hard failure rather than a skip.
          CI: "true"
        run: cargo test --all-targets --all-features

  # ---------------------------------------------------------------------------
  # cross-platform-check -- does the code still COMPILE on macOS and Windows?
  # We do not run tests on these platforms; that would more than double CI
  # runtime for little extra coverage, since wpawolf's logic (pcap + 802.11
  # parsing) is OS-agnostic. This catches accidental Linux-only crate imports.
  # ---------------------------------------------------------------------------
  cross-platform-check:
    name: cross-check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    steps:
      - name: Checkout source
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        run: rustup show

      - name: Cache cargo build artefacts
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-cross-${{ hashFiles('**/Cargo.lock') }}-${{ hashFiles('**/rust-toolchain.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-cross-
            ${{ runner.os }}-cargo-

      - name: cargo check --all-features
        run: cargo check --all-targets --all-features

  # ---------------------------------------------------------------------------
  # msrv -- Minimum Supported Rust Version. Cargo.toml declares
  # `rust-version = "1.95"`. This job proves we haven't accidentally used a
  # language feature newer than that.
  # ---------------------------------------------------------------------------
  msrv:
    name: msrv (1.95)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout source
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false

      - name: Install Rust 1.95 toolchain
        # rust-toolchain.toml uses stable (latest) for primary jobs; here
        # we install a second toolchain side-by-side and make it the default
        # for this job only. --profile minimal skips extras.
        run: |
          set -euo pipefail
          rustup toolchain install 1.95.0 --profile minimal --component clippy
          rustup default 1.95.0

      - name: Cache cargo build artefacts
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ubuntu-cargo-msrv-${{ hashFiles('**/Cargo.lock') }}

      - name: cargo check on MSRV
        # `check` not `test` or `build`: compiling to linked binaries adds
        # 30+ seconds for no additional coverage of whether source uses too-
        # new APIs.
        run: cargo check --all-targets --all-features

  # ---------------------------------------------------------------------------
  # docs -- does `cargo doc` succeed with rustdoc warnings treated as errors?
  # Broken intra-doc links and missing doc comments on public items are hard
  # failures.
  # ---------------------------------------------------------------------------
  docs:
    name: docs
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout source
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        run: rustup show

      - name: Cache cargo build artefacts
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ubuntu-cargo-docs-${{ hashFiles('**/Cargo.lock') }}-${{ hashFiles('**/rust-toolchain.toml') }}
          restore-keys: |
            ubuntu-cargo-docs-
            ubuntu-cargo-

      - name: cargo doc
        env:
          # Turns rustdoc warnings into errors so broken links fail CI.
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --all-features --no-deps

  # ---------------------------------------------------------------------------
  # hygiene -- repository-hygiene checks that do not involve compiling Rust.
  # Fast (single-digit seconds). Caught early so reviewers do not spend time
  # on a PR that will be blocked on non-ASCII bytes or CRLF line endings.
  # ---------------------------------------------------------------------------
  hygiene:
    name: hygiene
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout source
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false

      - name: Run hygiene targets
        # The Makefile encodes the ASCII/LF policy the project has chosen.
        # Keeping the rules in the Makefile means contributors can run the
        # same check locally with one command.
        run: make hygiene

  # ---------------------------------------------------------------------------
  # unused-deps -- cargo-machete flags dependencies listed in Cargo.toml that
  # are never referenced from source. Keeps the dependency graph honest.
  # ---------------------------------------------------------------------------
  unused-deps:
    name: unused deps (machete)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout source
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        run: rustup show

      - name: Cache cargo-machete binary
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: |
            ~/.cargo/bin/cargo-machete
            ~/.cargo/registry/index/
          key: ubuntu-cargo-machete-v1

      - name: Install cargo-machete
        # --locked installs exactly what the tool's published Cargo.lock
        # resolves to, which is deterministic across CI runs.
        run: |
          set -euo pipefail
          if ! command -v cargo-machete > /dev/null 2>&1; then
            cargo install cargo-machete --locked
          fi

      - name: cargo machete
        run: cargo machete
