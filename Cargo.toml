[dependencies]
# Gzip decompression for .pcap.gz / .pcapng.gz inputs. Pure-Rust backend so we
# avoid a C dependency and keep the `cargo deny` supply-chain gate tight.
flate2 = { version = "1", default-features = false, features = ["rust_backend"] }
# IEEE 802.11 FCS verification. Standard CRC-32 (ISO 3309), same algorithm as
# Ethernet and gzip. Already a transitive dep via flate2; promoted to direct for
# SIMD-accelerated per-packet FCS validation (~20 GB/s vs ~3 GB/s lookup table).
crc32fast = "1"
# CLI argument parsing. Minimal feature set: no env, no yaml, no suggestions.
clap = { version = "4", default-features = false, features = ["std", "derive", "help", "usage", "error-context", "color"] }
# Parallel iteration for Phase 4 pairing. Replaces ~70 lines of manual
# std::thread::scope + LPT scheduling with par_iter() and work-stealing.
rayon = "1"
# Cross-platform process RSS + total RAM queries. Replaces Linux-only
# /proc/self/status and /proc/meminfo parsing with System::process(pid).memory()
# and System::total_memory(). Works on Linux, macOS, and Windows.
sysinfo = "0.39"

# --- Lint policy ---
[profile.dev]
# Catch integer overflows in debug builds rather than wrapping silently.
overflow-checks = true

[profile.release]
# Full link-time optimisation for maximum performance and smaller binary.
lto = true
# Single codegen unit forces cross-crate inlining; required for full LTO.
codegen-units = 1
# Abort on panic -- no unwinding machinery in the binary.
panic = "abort"
# Catch overflows in release too; remove only if profiling proves the cost.
overflow-checks = true
# Strip debug symbols from the release binary.
strip = "symbols"

[profile.profiling]
inherits = "release"
debug = 2
strip = false

[profile.test]
# Overflow checks in tests to catch arithmetic bugs.
overflow-checks = true

[lints]
# Both the wpawolf crate and tools/fixturegen inherit the workspace lint
# policy below. Update lints in one place.
workspace = true

[workspace.lints.rust]
unsafe_code = "forbid"
missing_docs = "warn"
missing_debug_implementations = "warn"
unreachable_pub = "warn"
unused_import_braces = "warn"
unused_qualifications = "warn"
unused_lifetimes = "warn"
trivial_casts = "warn"
trivial_numeric_casts = "warn"
elided_lifetimes_in_paths = "warn"
explicit_outlives_requirements = "warn"
keyword_idents = { level = "deny", priority = 1 }
macro_use_extern_crate = "deny"
non_ascii_idents = "forbid"
single_use_lifetimes = "warn"
unused_crate_dependencies = "warn"
unused_extern_crates = "warn"
variant_size_differences = "warn"

[workspace.lints.clippy]
# Lint groups -- enable everything, then allow specific false-positive-prone lints below.
all = { level = "deny", priority = -1 }
pedantic = { level = "warn", priority = -1 }
nursery = { level = "warn", priority = -1 }
cargo = { level = "warn", priority = -1 }

# --- Restriction lints (cherry-picked, not the whole group) ---
# Each must be justified; the restriction group contains contradictory lints.
# No #[allow(...)] without a reason string.
allow_attributes_without_reason = "warn"
# No dbg!() in committed code.
dbg_macro = "deny"
# No todo!() / unimplemented!() -- use proper error handling.
todo = "deny"
unimplemented = "deny"
# Prefer .clone() / .to_owned() over .to_string() for non-Display conversions.
str_to_string = "warn"
# No std::mem::forget -- almost always a bug.
mem_forget = "deny"
# No indexing into slices -- use .get() for safe access.
indexing_slicing = "warn"
# No unwrap/expect in library code -- force proper error propagation.
unwrap_used = "warn"
expect_used = "warn"
# No panic! -- handle errors properly.
panic = "warn"
# Detect lossy float-to-int or int-to-float casts.
cast_possible_truncation = "warn"
cast_sign_loss = "warn"
cast_precision_loss = "warn"
cast_possible_wrap = "warn"
# Warn on large enum variant size differences (consider Box).
large_enum_variant = "warn"
# No .unwrap() on mutex locks -- can panic on poisoning.
mutex_atomic = "warn"
# Explicit iteration: prefer .iter() / .iter_mut() over implicit deref.
explicit_iter_loop = "warn"
explicit_into_iter_loop = "warn"
# Require `Self` in impl blocks where possible.
use_self = "warn"
# Warn on needlessly borrowed references.
needless_borrow = "warn"
needless_pass_by_value = "warn"

# --- Allow list (justify every entry) ---
# module_name_repetitions: common in idiomatic Rust (e.g. error::Error).
module_name_repetitions = "allow"
# multiple_crate_versions: transitive dependency version conflicts are not actionable.
multiple_crate_versions = "allow"
# wildcard_imports: deny everywhere; selectively #[allow] in test modules.
wildcard_imports = "deny"
