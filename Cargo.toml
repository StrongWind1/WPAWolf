[workspace]
# The repository is a Cargo workspace so the `wpawolf` binary crate and the
# `wpawolf-fixturegen` test-capture generator can share a single Cargo.lock,
# a single `[workspace.lints.*]` policy, and a single target/ directory. Add
# a new tool here (e.g. tools/another-tool) by appending to `members` below
# and pointing the new crate's `[lints]` block at `workspace = true`.
members = [".", "tools/fixturegen"]
resolver = "3"

[package]
name = "wpawolf"
version = "1.2.0"
edition = "2024"
rust-version = "1.95"
description = "WPA/WPA2/WPA3 PSK-family (incl. PSK-SHA256/384 and FT-PSK) handshake + PMKID extractor for hashcat (all 11 hash types, modes 22000/37100)"
license = "Apache-2.0"
repository = "https://github.com/StrongWind1/WPAWolf"
homepage = "https://github.com/StrongWind1/WPAWolf"
documentation = "https://github.com/StrongWind1/WPAWolf"
readme = "README.md"
keywords = ["wifi", "security", "wireless", "wpa", "hashcat"]
categories = ["command-line-utilities", "network-programming"]
include = ["src/**/*", "Cargo.toml", "Cargo.lock", "README.md", "LICENSE", "CHANGELOG.md"]

